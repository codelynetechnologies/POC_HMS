kind = "api"
previewPath = "/"
title = "HMS Patient Registration"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/"]

[services.development]
run = "dotnet run --no-launch-profile --project /home/runner/workspace/backend/src/HMS.PatientRegistration.Api/HMS.PatientRegistration.Api.csproj"

[services.development.env]
PORT = "8080"
DOTNET_CLI_TELEMETRY_OPTOUT = "1"
DOTNET_NOLOGO = "1"
ASPNETCORE_ENVIRONMENT = "Development"

[services.production]

[services.production.build]
args = ["dotnet", "publish", "/home/runner/workspace/backend/src/HMS.PatientRegistration.Api/HMS.PatientRegistration.Api.csproj", "-c", "Release", "-o", "/home/runner/workspace/backend/publish"]

[services.production.build.env]
DOTNET_CLI_TELEMETRY_OPTOUT = "1"
DOTNET_NOLOGO = "1"

[services.production.run]
args = ["dotnet", "/home/runner/workspace/backend/publish/HMS.PatientRegistration.Api.dll"]

[services.production.run.env]
PORT = "8080"
ASPNETCORE_ENVIRONMENT = "Production"

[services.production.health.startup]
path = "/api/healthz"
